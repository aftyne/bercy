<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bercy Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#636466",
              "on-primary-fixed": "#1a1c1d",
              "border-subtle": "#3F3F46",
              "surface-variant": "#353434",
              "on-secondary-fixed": "#1a1b22",
              "on-surface": "#e5e2e1",
              "on-primary": "#2f3132",
              "on-tertiary-fixed-variant": "#4c4543",
              "on-secondary-container": "#b4b4bd",
              "primary-container": "#e2e2e3",
              "on-tertiary-fixed": "#1f1b18",
              primary: "#ffffff",
              "inverse-surface": "#e5e2e1",
              "card-bg": "#27272A",
              "surface-container-lowest": "#0e0e0e",
              "success-text": "#34D399",
              tertiary: "#ffffff",
              "on-surface-variant": "#c4c7c9",
              "success-border": "rgba(16, 185, 129, 0.2)",
              "surface-dim": "#141313",
              "on-primary-fixed-variant": "#454748",
              "on-error": "#690005",
              error: "#ffb4ab",
              "on-error-container": "#ffdad6",
              "surface-container-low": "#1c1b1b",
              "on-tertiary": "#352f2d",
              "primary-fixed-dim": "#c6c6c7",
              "destructive-text": "#F87171",
              "surface-container-highest": "#353434",
              "error-container": "#93000a",
              "destructive-border": "rgba(127, 29, 29, 0.5)",
              "inverse-on-surface": "#313030",
              "on-tertiary-container": "#6a6360",
              "app-bg": "#18181B",
              "tertiary-fixed": "#ebe0dc",
              "on-secondary": "#2f3037",
              "tertiary-fixed-dim": "#cec4c1",
              "tertiary-container": "#ebe0dc",
              "primary-fixed": "#e2e2e3",
              "secondary-container": "#45464e",
              secondary: "#c6c6cf",
              "success-bg": "rgba(16, 185, 129, 0.1)",
              surface: "#141313",
              "inverse-primary": "#5d5e60",
              "secondary-fixed": "#e2e1eb",
              "secondary-fixed-dim": "#c6c6cf",
              background: "#141313",
              "outline-variant": "#444749",
              "surface-tint": "#c6c6c7",
              "surface-container": "#201f1f",
              "surface-bright": "#3a3939",
              "code-block-bg": "#09090B",
              "on-background": "#e5e2e1",
              "surface-container-high": "#2a2a2a",
              "on-secondary-fixed-variant": "#45464e",
              outline: "#8e9193",
              "item-hover": "rgba(63, 63, 70, 0.4)",
              "destructive-hover-bg": "rgba(239, 68, 68, 0.1)",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "container-max-width": "896px",
              "card-padding-x": "1rem",
              "inline-gap": "0.5rem",
              "card-padding-y": "0.75rem",
              "section-gap": "3rem",
              "item-padding": "1rem",
            },
            fontFamily: {
              "card-header": ["Inter"],
              "button-text": ["Inter"],
              "page-title": ["Inter"],
              metadata: ["Inter"],
              "file-path": ["Inter"],
            },
            fontSize: {
              "card-header": [
                "14px",
                {
                  lineHeight: "20px",
                  fontWeight: "500",
                },
              ],
              "button-text": [
                "14px",
                {
                  lineHeight: "20px",
                  fontWeight: "500",
                },
              ],
              "page-title": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              metadata: [
                "12px",
                {
                  lineHeight: "16px",
                  fontWeight: "400",
                },
              ],
              "file-path": [
                "14px",
                {
                  lineHeight: "20px",
                  fontWeight: "400",
                },
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-[#111114] text-on-background min-h-screen antialiased flex flex-col items-center">
    <main class="w-full max-w-4xl flex flex-col h-full space-y-8 px-4 pt-10 pb-24 md:pb-12">
      <header class="flex items-end justify-between px-2">
        <h1 class="text-3xl font-semibold text-zinc-100 tracking-tight">Bercy</h1>
      </header>

      <section
        class="bg-zinc-900 border border-zinc-800/50 rounded-2xl overflow-hidden flex flex-col flex-1"
      >
        <nav class="flex border-b border-zinc-800/50 bg-zinc-900/50">
          <button
            id="tab-unused"
            class="flex-1 py-4 text-sm font-medium transition-all border-b-2 border-indigo-500 text-zinc-100"
            onclick="switchTab('unused')"
          >
            Unused Files
            <span class="text-zinc-500 font-normal">(<span id="unused-files-count">0</span>)</span>
          </button>
          <button
            id="tab-ignored"
            class="flex-1 py-4 text-sm font-medium transition-all border-b-2 border-transparent text-zinc-500 hover:text-zinc-300"
            onclick="switchTab('ignored')"
          >
            Ignored Files
            <span class="text-zinc-600 font-normal">(<span id="ignored-files-count">0</span>)</span>
          </button>
        </nav>

        <div
          class="px-4 py-4 flex items-center justify-between bg-zinc-900/30 border-b border-zinc-800/30 sticky top-0 z-10"
        >
          <div class="flex items-center gap-3">
            <input
              id="selectAllCheckbox"
              type="checkbox"
              class="w-4 h-4 rounded border-zinc-700 bg-zinc-950 text-indigo-500 focus:ring-0 focus:ring-offset-0 cursor-pointer accent-indigo-500"
              onchange="toggleSelectAll(this)"
            />
            <label
              for="selectAllCheckbox"
              class="text-xs font-medium text-zinc-400 uppercase tracking-wide cursor-pointer hidden sm:block"
              >Select All</label
            >
            <label
              for="selectAllCheckbox"
              class="text-xs font-medium text-zinc-400 uppercase tracking-wide cursor-pointer sm:hidden"
              >All</label
            >
          </div>

          <div class="flex items-center gap-2">
            <button
              id="bulkIgnoreBtn"
              onclick="promptBulkIgnore()"
              class="px-4 py-1.5 text-xs font-medium text-zinc-400 hover:text-zinc-100 bg-zinc-800 rounded-md transition-colors disabled:text-zinc-500 disabled:bg-zinc-800/30 disabled:border-transparent disabled:pointer-events-none"
              disabled
            >
              Ignore Selected
              <span id="ignore-selected-count" class="ml-1">(0)</span>
            </button>
            <button
              id="bulkDeleteBtn"
              onclick="promptBulkDelete()"
              disabled
              class="px-4 py-1.5 text-xs font-medium rounded-md transition-all border border-red-500/20 text-red-400 bg-red-500/5 hover:bg-red-500/15 disabled:text-zinc-500 disabled:bg-zinc-800/30 disabled:border-transparent disabled:pointer-events-none"
            >
              Delete Selected <span id="delete-selected-count" class="ml-1">(0)</span>
            </button>
          </div>
        </div>

        <div class="flex-1 overflow-hidden" id="file-list-viewport">
          <ul id="unused-files-container" class="divide-y divide-zinc-800/40">
            <!-- Skeletons -->
            <li
              class="group flex items-center justify-between px-4 py-4 hover:bg-zinc-800/30 transition-colors animate-pulse loading-skeleton"
            >
              <div class="flex items-start gap-4 flex-1">
                <div class="w-4 h-4 rounded border-zinc-800 bg-zinc-950 flex-shrink-0"></div>
                <div class="flex flex-col gap-1 w-full max-w-sm">
                  <div class="h-7 w-full bg-zinc-800 rounded-md"></div>
                </div>
              </div>
              <div class="flex gap-1 opacity-50">
                <div class="w-8 h-8 rounded-md bg-zinc-800"></div>
                <div class="w-8 h-8 rounded-md bg-zinc-800"></div>
              </div>
            </li>
            <li
              class="group flex items-center justify-between px-4 py-4 hover:bg-zinc-800/30 transition-colors animate-pulse loading-skeleton"
            >
              <div class="flex items-start gap-4 flex-1">
                <div class="w-4 h-4 rounded border-zinc-800 bg-zinc-950 flex-shrink-0"></div>
                <div class="flex flex-col gap-1 w-full max-w-md">
                  <div class="h-7 w-full bg-zinc-800 rounded-md"></div>
                </div>
              </div>
              <div class="flex gap-1 opacity-50">
                <div class="w-8 h-8 rounded-md bg-zinc-800"></div>
                <div class="w-8 h-8 rounded-md bg-zinc-800"></div>
              </div>
            </li>
            <li
              class="group flex items-center justify-between px-4 py-4 hover:bg-zinc-800/30 transition-colors animate-pulse loading-skeleton"
            >
              <div class="flex items-start gap-4 flex-1">
                <div class="w-4 h-4 rounded border-zinc-800 bg-zinc-950 flex-shrink-0"></div>
                <div class="flex flex-col gap-1 w-full max-w-xs">
                  <div class="h-7 w-full bg-zinc-800 rounded-md"></div>
                </div>
              </div>
              <div class="flex gap-1 opacity-50">
                <div class="w-8 h-8 rounded-md bg-zinc-800"></div>
                <div class="w-8 h-8 rounded-md bg-zinc-800"></div>
              </div>
            </li>
          </ul>
          <ul id="ignored-files-container" class="divide-y divide-zinc-800/40 hidden"></ul>
        </div>

        <!-- Empty State -->
        <div
          id="unused-empty-state"
          class="hidden flex-col items-center justify-center h-64 border-2 border-dashed border-emerald-500/10 rounded-xl m-6"
        >
          <p class="text-emerald-400 text-sm font-medium">Workspace is clean</p>
          <p class="text-zinc-600 text-xs mt-1">No unused files were found in this directory.</p>
        </div>
        <div
          id="ignored-empty-state"
          class="hidden flex-col items-center justify-center h-64 border-2 border-dashed border-zinc-700/50 rounded-xl m-6"
        >
          <p class="text-zinc-400 text-sm font-medium">No ignored files</p>
          <p class="text-zinc-600 text-xs mt-1">Files you choose to ignore will appear here.</p>
        </div>

        <footer
          class="px-6 py-3 border-t border-zinc-800/50 bg-zinc-900/50 flex justify-between items-center text-[11px] uppercase tracking-widest text-zinc-600"
        >
          <div class="flex items-center gap-2">
            <div class="size-2 rounded-full bg-yellow-500 shrink-0" id="status-circle"></div>
            <p class="text-zinc-400" id="status-text">Scanning...</p>
          </div>
          <div class="h-4 w-40 bg-zinc-800/50 rounded" id="skeleton-framework-target"></div>
          <p class="hidden" id="framework-target"></p>
        </footer>
      </section>

      <!-- Toast Notification Container -->
      <div
        id="toast-container"
        class="fixed bottom-12 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none translate-y-4"
      >
        <div
          class="flex items-center gap-3 bg-zinc-800 text-zinc-100 text-sm px-5 py-2.5 rounded-full border border-zinc-700/50"
        >
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          <span id="toast-message">Message here</span>
        </div>
      </div>
    </main>

    <!-- Confirmation Modal -->
    <div
      id="action-modal"
      class="fixed inset-0 z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300"
    >
      <div class="absolute inset-0 bg-zinc-950/80" id="action-modal-backdrop"></div>
      <div
        class="relative bg-zinc-900 border border-zinc-800 rounded-xl p-6 w-full max-w-sm transform scale-95 transition-transform duration-300"
        id="action-modal-panel"
      >
        <div class="flex items-center gap-3 mb-4">
          <div
            class="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center border border-red-500/20 shrink-0"
            id="action-modal-icon-bg"
          >
            <span class="material-symbols-outlined text-red-400 text-xl" id="action-modal-icon"
              >warning</span
            >
          </div>
          <h3 class="text-lg font-semibold text-zinc-100" id="action-modal-title"></h3>
        </div>
        <p class="text-sm text-zinc-400 mb-6" id="action-modal-message"></p>
        <div class="flex items-center justify-end gap-3">
          <button
            id="action-modal-cancel"
            onclick="hideModal()"
            class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-zinc-100 bg-zinc-800/50 hover:bg-zinc-800 rounded-lg transition-colors border border-transparent hover:border-zinc-700"
          >
            Cancel
          </button>
          <button
            id="action-modal-confirm"
            class="px-4 py-2 text-sm font-medium text-white bg-red-500/80 hover:bg-red-500 rounded-lg transition-colors border border-red-600"
          ></button>
        </div>
      </div>
    </div>

    <script>
      const tabUnused = document.getElementById("tab-unused");
      const tabIgnored = document.getElementById("tab-ignored");
      const unusedFilesContainer = document.getElementById("unused-files-container");
      const ignoredFilesContainer = document.getElementById("ignored-files-container");
      const skeletons = document.querySelectorAll(".loading-skeleton");
      const unusedFilesCount = document.getElementById("unused-files-count");
      const ignoredFilesCount = document.getElementById("ignored-files-count");
      const unusedEmpty = document.getElementById("unused-empty-state");
      const ignoredEmpty = document.getElementById("ignored-empty-state");
      const bulkIgnoreButton = document.getElementById("bulkIgnoreBtn");
      const bulkIgnoreSelectedCount = document.getElementById("ignore-selected-count");
      const bulkDeleteButton = document.getElementById("bulkDeleteBtn");
      const bulkDeleteSelectedCount = document.getElementById("delete-selected-count");
      const statusCircle = document.getElementById("status-circle");
      const statusText = document.getElementById("status-text");
      const frameworkTarget = document.getElementById("framework-target");
      const selectAllCheckbox = document.getElementById("selectAllCheckbox");
      const toast = document.getElementById("toast-container");
      const msg = document.getElementById("toast-message");

      let selectedFiles = new Set();
      let unusedFiles = [];
      let ignoredFiles = [];

      async function loadProjectMetadata() {
        try {
          const res = await fetch("/api/meta");
          if (!res.ok) return;

          const data = await res.json();

          frameworkTarget.classList.remove("hidden");
          frameworkTarget.innerText = `Target: ${data.framework} ${data.version}`;
        } catch (err) {
          console.error("Failed to load project metadata", err);
        } finally {
          document.getElementById("skeleton-framework-target").classList.add("hidden");
        }
      }

      function renderIgnoreFiles() {
        ignoredFiles.forEach((file) => {
          const li = document.createElement("li");
          li.className =
            "p-item-padding hover:bg-item-hover transition-colors group flex flex-col md:flex-row md:items-center justify-between gap-4";
          li.innerHTML = `
              <div class="flex items-start gap-3 w-full md:w-auto overflow-hidden">
              <input
                class="mt-1 rounded bg-code-block-bg border-border-subtle focus:ring-0 focus:ring-offset-0 w-4 h-4 cursor-pointer shrink-0 file-checkbox text-indigo-500 accent-indigo-500"
                value="${file}" onchange="toggleFileSelection('${file}', this.checked)"
                type="checkbox"
              />
              <div class="flex flex-col gap-1 min-w-0 w-full">
                <div
                  class="bg-zinc-950/50 border-zinc-800/50 rounded-md px-4 py-1 truncate w-full md:max-w-lg"
                >
                  <code class="font-mono text-file-path text-primary break-all"
                    >${file}</code
                  >
                </div>
              </div>
            </div>
            <div
              class="flex gap-2 shrink-0 justify-end ml-7 md:ml-0"
            >
              <button
                class="p-2 text-emerald-400 hover:bg-emerald-500/10 rounded-md transition-colors"
                title="Restore file"
                onclick="promptRestoreFile('${file}', this)"
              >
                <span class="material-symbols-outlined text-[18px] leading-none block">settings_backup_restore</span>
              </button>
              <button
                class="p-2 text-red-400 rounded-md hover:bg-red-500/10 transition-colors"
                title="Delete file"
                onclick="promptDeleteFile('${file}', this)"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </div>
            `;
          ignoredFilesContainer.appendChild(li);
        });
      }

      async function init() {
        try {
          const res = await fetch("/api/knip");
          const data = await res.json();

          unusedFiles = data.files;
          ignoredFiles = data.files.length === 0 ? [] : data.ignored;

          unusedFilesCount.innerText = unusedFiles.length;
          ignoredFilesCount.innerText = ignoredFiles.length;

          if (data.files.length === 0) {
            document.getElementById("unused-empty-state").classList.remove("hidden");
            document.getElementById("unused-empty-state").classList.add("flex");
            return;
          }

          data.files.forEach((file) => {
            const li = document.createElement("li");
            li.className =
              "p-item-padding hover:bg-item-hover transition-colors group flex flex-col md:flex-row md:items-center justify-between gap-4";
            li.innerHTML = `
              <div class="flex items-start gap-3 w-full md:w-auto overflow-hidden">
              <input
                class="mt-1 rounded bg-code-block-bg border-border-subtle focus:ring-0 focus:ring-offset-0 w-4 h-4 cursor-pointer shrink-0 file-checkbox text-indigo-500 accent-indigo-500"
                value="${file}" onchange="toggleFileSelection('${file}', this.checked)"
                type="checkbox"
              />
              <div class="flex flex-col gap-1 min-w-0 w-full">
                <div
                  class="bg-zinc-950/50 border-zinc-800/50 rounded-md px-4 py-1 truncate w-full md:max-w-lg"
                >
                  <code class="font-mono text-file-path text-primary break-all"
                    >${file}</code
                  >
                </div>
              </div>
            </div>
            <div
              class="flex gap-2 shrink-0 justify-end ml-7 md:ml-0"
            >
             <button
                  class="p-2 text-zinc-400 rounded-md hover:bg-zinc-500/15 transition-colors"
                  title="Ignore file"
                  onclick="promptIgnoreFile('${file}', this)"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.956 9.956 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                </button>
                <button
                  class="p-2 text-red-400 rounded-md hover:bg-red-500/10 transition-colors"
                  title="Delete file"
                  onclick="promptDeleteFile('${file}', this)"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </div>
            `;
            unusedFilesContainer.appendChild(li);
          });

          renderIgnoreFiles();

          if (typeof updateEmptyStates === "function") {
            updateEmptyStates();
          }
        } catch (err) {
          console.log(err);
        } finally {
          skeletons.forEach((skeleton) => {
            skeleton.classList.remove("flex");
            skeleton.classList.add("hidden");
          });

          statusCircle.classList.remove("bg-yellow-500");
          statusCircle.classList.add("bg-emerald-500");
          statusText.innerText = "Ready";
        }
      }

      let confirmActionCallback = null;

      document.addEventListener("DOMContentLoaded", () => {
        const backdrop = document.getElementById("action-modal-backdrop");
        if (backdrop) backdrop.addEventListener("click", hideModal);

        const confirmBtn = document.getElementById("action-modal-confirm");
        if (confirmBtn)
          confirmBtn.addEventListener("click", () => {
            if (confirmActionCallback) confirmActionCallback();
            hideModal();
          });
      });

      function showModal(title, message, type, onConfirm) {
        const modal = document.getElementById("action-modal");
        const panel = document.getElementById("action-modal-panel");
        const iconBg = document.getElementById("action-modal-icon-bg");
        const icon = document.getElementById("action-modal-icon");
        const confirmBtn = document.getElementById("action-modal-confirm");

        document.getElementById("action-modal-title").innerText = title;
        document.getElementById("action-modal-message").innerText = message;
        confirmActionCallback = onConfirm;

        iconBg.className =
          "w-10 h-10 rounded-full flex items-center justify-center border shrink-0 ";
        confirmBtn.className =
          "px-4 py-2 text-sm font-medium text-white rounded-lg transition-colors border ";

        if (type === "delete") {
          iconBg.className += "bg-red-500/10 border-red-500/20";
          icon.className = "material-symbols-outlined text-red-400 text-xl";
          icon.innerText = "warning";
          confirmBtn.className +=
            "bg-red-500/80 hover:bg-red-500 border-red-600 shadow-[0_0_15px_rgba(239,68,68,0.2)]";
          confirmBtn.innerText = "Delete";
        } else if (type === "ignore") {
          iconBg.className += "bg-amber-500/10 border-amber-500/20";
          icon.className = "material-symbols-outlined text-amber-400 text-xl";
          icon.innerText = "visibility_off";
          confirmBtn.className +=
            "bg-amber-500/80 hover:bg-amber-500 border-amber-600 shadow-[0_0_15px_rgba(245,158,11,0.2)]";
          confirmBtn.innerText = "Ignore";
        } else if (type === "restore") {
          iconBg.className += "bg-emerald-500/10 border-emerald-500/20";
          icon.className = "material-symbols-outlined text-emerald-400 text-xl";
          icon.innerText = "settings_backup_restore";
          confirmBtn.className +=
            "bg-emerald-500/80 hover:bg-emerald-500 border-emerald-600 shadow-[0_0_15px_rgba(16,185,129,0.2)]";
          confirmBtn.innerText = "Restore";
        }

        modal.classList.remove("opacity-0", "pointer-events-none");
        panel.classList.remove("scale-95");
        panel.classList.add("scale-100");
      }

      function hideModal() {
        const modal = document.getElementById("action-modal");
        const panel = document.getElementById("action-modal-panel");

        modal.classList.add("opacity-0", "pointer-events-none");
        panel.classList.remove("scale-100");
        panel.classList.add("scale-95");
        confirmActionCallback = null;
      }

      async function deleteFile(filePath, btnElement) {
        try {
          const res = await fetch("/api/knip", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filePath }),
          });

          if (res.ok) {
            btnElement.closest("li").remove();
            unusedFilesCount.innerText = parseInt(unusedFilesCount.innerText) - 1;

            const li = btnElement.closest("li");
            if (li) li.remove();

            if (toast && msg) {
              msg.innerText = filePath.split("/").pop() + " deleted";
              toast.classList.remove("opacity-0", "pointer-events-none", "translate-y-4");
              setTimeout(
                () => toast.classList.add("opacity-0", "pointer-events-none", "translate-y-4"),
                3000,
              );
            }
          } else {
            alert("Failed to delete file.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }

      function promptDeleteFile(file, btn) {
        showModal(
          "Delete File",
          `Are you sure you want to delete "${file.split("/").pop()}"? This action cannot be undone.`,
          "delete",
          () => {
            deleteFile(file, btn);
          },
        );
      }

      function toggleFileSelection(filePath, isChecked) {
        if (isChecked) {
          selectedFiles.add(filePath);
        } else {
          selectedFiles.delete(filePath);
        }
        updateSelectAllUI();
        updateBulkDeleteButton();
        updateBulkIgnoreButton();
      }

      function toggleSelectAll(masterCheckbox) {
        const isChecked = masterCheckbox.checked;
        const individualCheckboxes = document.querySelectorAll(".file-checkbox");

        selectedFiles.clear();

        if (isChecked) {
          unusedFiles.forEach((file) => selectedFiles.add(file));
        }

        individualCheckboxes.forEach((cb) => (cb.checked = isChecked));

        updateBulkDeleteButton();
        updateBulkIgnoreButton();
      }

      function updateSelectAllUI() {
        const masterCheckbox = document.getElementById("selectAllCheckbox");
        if (!masterCheckbox) return;

        masterCheckbox.checked =
          unusedFiles.length > 0 && selectedFiles.size === unusedFiles.length;
      }

      function updateBulkDeleteButton() {
        if (!bulkDeleteButton) return;

        if (selectedFiles.size > 0) {
          bulkDeleteButton.disabled = false;
          bulkDeleteSelectedCount.innerText = `(${selectedFiles.size})`;
          bulkDeleteButton.className =
            "px-4 py-1.5 text-xs font-medium rounded-md transition-all border border-red-500/20 text-red-400 bg-red-500/5 hover:bg-red-500/15 disabled:text-zinc-500 disabled:bg-zinc-800/30 disabled:border-transparent disabled:pointer-events-none";
        } else {
          bulkDeleteButton.disabled = true;
          bulkDeleteSelectedCount.innerText = `(${selectedFiles.size})`;
          bulkDeleteButton.className =
            "px-4 py-1.5 text-xs font-medium rounded-md transition-all border border-red-500/20 text-red-400 bg-red-500/5 hover:bg-red-500/15 disabled:text-zinc-500 disabled:bg-zinc-800/30 disabled:border-transparent disabled:pointer-events-none";
        }
      }

      function updateBulkIgnoreButton() {
        if (!bulkIgnoreButton) return;

        if (selectedFiles.size > 0) {
          bulkIgnoreButton.disabled = false;
          bulkIgnoreSelectedCount.innerText = `(${selectedFiles.size})`;
          bulkIgnoreButton.className =
            "px-4 py-1.5 text-xs font-medium rounded-md transition-all border border-zinc-500/20 text-zinc-400 bg-zinc-500/5 hover:bg-zinc-500/15 disabled:text-zinc-500 disabled:bg-zinc-800/30 disabled:border-transparent disabled:pointer-events-none";
        } else {
          bulkIgnoreButton.disabled = true;
          bulkIgnoreSelectedCount.innerText = `(${selectedFiles.size})`;
          bulkIgnoreButton.className =
            "px-4 py-1.5 text-xs font-medium rounded-md transition-all border border-red-500/20 text-red-400 bg-red-500/5 hover:bg-red-500/15 disabled:text-zinc-500 disabled:bg-zinc-800/30 disabled:border-transparent disabled:pointer-events-none";
        }
      }

      function promptBulkDelete() {
        let count = typeof selectedFiles !== "undefined" ? selectedFiles.size : 0;
        showModal(
          "Delete Selected Files",
          `Are you sure you want to delete ${count} file${count === 1 ? "" : "s"}? This action cannot be undone.`,
          "delete",
          () => {
            if (typeof executeBulkDelete === "function") {
              executeBulkDelete();
            } else {
              const toast = document.getElementById("toast-container");
              const msg = document.getElementById("toast-message");
              if (toast && msg) {
                msg.innerText = count + " files deleted";
                toast.classList.remove("opacity-0", "pointer-events-none", "translate-y-4");
                setTimeout(
                  () => toast.classList.add("opacity-0", "pointer-events-none", "translate-y-4"),
                  3000,
                );
              }
            }
          },
        );
      }

      async function executeBulkDelete() {
        if (selectedFiles.size === 0) return;

        const filesArray = Array.from(selectedFiles);

        try {
          const res = await fetch("/api/knip", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filePaths: filesArray }),
          });

          if (res.ok) {
            unusedFiles = unusedFiles.filter((file) => !selectedFiles.has(file));

            selectedFiles.forEach((file) => {
              const checkbox = document.querySelector(`input[value="${file}"]`);
              if (checkbox) {
                const row = checkbox.closest("li");
                if (row) row.remove();
              }
            });

            if (unusedFilesCount) {
              unusedFilesCount.innerText = unusedFiles.length;
            }

            if (toast && msg) {
              msg.innerText = selectedFiles.size + " files deleted";
              toast.classList.remove("opacity-0", "pointer-events-none", "translate-y-4");
              setTimeout(
                () => toast.classList.add("opacity-0", "pointer-events-none", "translate-y-4"),
                3000,
              );
            }

            selectedFiles.clear();
            updateSelectAllUI();
            updateBulkDeleteButton();

            if (unusedFiles.length === 0) {
              document.getElementById("file-list").classList.add("hidden");
              document.getElementById("unused-empty-state").classList.remove("hidden");
              document.getElementById("unused-empty-state").classList.add("flex");
            }
          } else {
            alert("Failed to delete some files.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }

      async function ignoreFile(filePath, btnElement) {
        try {
          const res = await fetch("/api/ignore", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filePaths: [filePath] }),
          });

          if (res.ok) {
            btnElement.closest("li").remove();
            unusedFilesCount.innerText = parseInt(unusedFilesCount.innerText) - 1;

            const li = btnElement.closest("li");
            if (li) li.remove();

            if (toast && msg) {
              msg.innerText = filePath.split("/").pop() + " ignored";
              toast.classList.remove("opacity-0", "pointer-events-none", "translate-y-4");
              setTimeout(
                () => toast.classList.add("opacity-0", "pointer-events-none", "translate-y-4"),
                3000,
              );
            }
          } else {
            alert("Failed to ignore file.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }

      function promptIgnoreFile(file, btn) {
        showModal(
          "Ignore File",
          `Are you sure you want to ignore "${file.split("/").pop()}"?`,
          "ignore",
          () => {
            ignoreFile(file, btn);
          },
        );
      }

      function promptBulkIgnore() {
        let count = typeof selectedFiles !== "undefined" ? selectedFiles.size : 0;
        showModal(
          "Ignore Selected Files",
          `Are you sure you want to ignore ${count} file${count === 1 ? "" : "s"}? They will be moved to the Ignored Files list.`,
          "ignore",
          () => {
            if (typeof executeBulkDelete === "function") {
              executeBulkDelete();
            } else {
              const toast = document.getElementById("toast-container");
              const msg = document.getElementById("toast-message");
              if (toast && msg) {
                msg.innerText = count + " files deleted";
                toast.classList.remove("opacity-0", "pointer-events-none", "translate-y-4");
                setTimeout(
                  () => toast.classList.add("opacity-0", "pointer-events-none", "translate-y-4"),
                  3000,
                );
              }
            }
          },
        );
      }

      function updateEmptyStates() {
        const tabUnusedActive = document
          .getElementById("tab-unused")
          .classList.contains("border-indigo-500");

        if (tabUnusedActive) {
          ignoredEmpty.classList.add("hidden");
          if (unusedFiles.length === 0) {
            unusedEmpty.classList.remove("hidden");
            unusedEmpty.classList.add("flex");
            unusedFilesContainer.classList.add("hidden");
          } else {
            unusedEmpty.classList.add("hidden");
            unusedEmpty.classList.remove("flex");
            unusedFilesContainer.classList.remove("hidden");
          }
        } else {
          unusedEmpty.classList.add("hidden");
          if (ignoredFiles.length === 0) {
            ignoredEmpty.classList.remove("hidden");
            ignoredEmpty.classList.add("flex");
            ignoredFilesContainer.classList.add("hidden");
          } else {
            console.log("malas");
            ignoredEmpty.classList.add("hidden");
            ignoredEmpty.classList.remove("flex");
            ignoredFilesContainer.classList.remove("hidden");
          }
        }
      }

      function switchTab(tabId) {
        const activeClasses = ["border-indigo-500", "text-zinc-100"];
        const inactiveClasses = ["border-transparent", "text-zinc-500", "hover:text-zinc-300"];

        // Reset selections when switching tabs
        if (selectAllCheckbox) selectAllCheckbox.checked = false;
        selectedFiles.clear();

        document.querySelectorAll(".file-checkbox").forEach((cb) => (cb.checked = false));
        if (typeof updateBulkDeleteButton === "function") updateBulkDeleteButton();

        if (tabId === "unused") {
          tabUnused.classList.remove(...inactiveClasses);
          tabUnused.classList.add(...activeClasses);

          tabIgnored.classList.remove(...activeClasses);
          tabIgnored.classList.add(...inactiveClasses);

          if (unusedFilesContainer) unusedFilesContainer.classList.remove("hidden");
          if (ignoredFilesContainer) ignoredFilesContainer.classList.add("hidden");
        } else {
          tabIgnored.classList.remove(...inactiveClasses);
          tabIgnored.classList.add(...activeClasses);

          tabUnused.classList.remove(...activeClasses);
          tabUnused.classList.add(...inactiveClasses);

          if (ignoredFilesContainer) ignoredFilesContainer.classList.remove("hidden");
          if (unusedFilesContainer) unusedFilesContainer.classList.add("hidden");
        }

        updateEmptyStates();
      }

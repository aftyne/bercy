    <script>
      const unusedFilesContainer = document.getElementById("unused-files-container");
      const skeletons = document.querySelectorAll(".loading-skeleton");
      const unusedFilesCount = document.getElementById("unused-files-count");
      const bulkDeleteButton = document.getElementById("bulkDeleteBtn");
      const bulkDeleteSelectedCount = document.getElementById("delete-selected-count");

      let selectedFiles = new Set();
      let unusedFiles = [];

      async function init() {
        try {
          const res = await fetch("/api/knip");
          const data = await res.json();

          unusedFiles = data.files;

          skeletons.forEach((skeleton) => {
            skeleton.classList.remove("flex");
            skeleton.classList.add("hidden");
          });

          unusedFilesCount.innerText = `(${data.files.length})`;

          data.files.forEach((file) => {
            const li = document.createElement("li");
            li.className =
              "p-item-padding hover:bg-item-hover transition-colors group flex flex-col md:flex-row md:items-center justify-between gap-4";
            li.innerHTML = `
              <div class="flex items-start gap-3 w-full md:w-auto overflow-hidden">
              <input
                class="mt-1 rounded bg-code-block-bg border-border-subtle text-outline-variant focus:ring-0 focus:ring-offset-0 w-4 h-4 cursor-pointer shrink-0 file-checkbox"
                value="${file}" onchange="toggleFileSelection('${file}', this.checked)"
                type="checkbox"
              />
              <div class="flex flex-col gap-1 min-w-0 w-full">
                <div
                  class="bg-code-block-bg rounded px-2 py-1 border border-surface-variant truncate w-full md:max-w-lg"
                >
                  <code class="font-mono text-file-path text-primary break-all"
                    >${file}</code
                  >
                </div>
                <span class="font-metadata text-metadata text-on-surface-variant"
                  >Last accessed: 14 months ago • 12 KB</span
                >
              </div>
            </div>
            <div
              class="flex gap-2 shrink-0 justify-end ml-7 md:ml-0"
            >
              <button
                class="font-button-text text-button-text text-on-surface-variant border border-border-subtle rounded-lg px-3 py-1.5 hover:bg-item-hover hover:text-primary transition-colors"
                title="Ignore file"
              >
                <span class="material-symbols-outlined text-[18px] leading-none block"
                  >visibility_off</span
                >
              </button>
              <button
                class="font-button-text text-button-text text-destructive-text border border-border-subtle rounded-lg px-3 py-1.5 hover:bg-destructive-hover-bg hover:border-destructive-border transition-colors"
                title="Delete file"
                onclick="deleteFile('${file}', this)"
              >
                <span class="material-symbols-outlined text-[18px] leading-none block">delete</span>
              </button>
            </div>
            `;
            unusedFilesContainer.appendChild(li);
          });
        } catch (err) {
          console.log(err);
          // alert("Failed to load files.");
        }
      }

      async function deleteFile(filePath, btnElement) {
        if (!confirm(`Permanently delete this file?\n\n${filePath}`)) return;

        try {
          const res = await fetch("/api/knip", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filePath }),
          });

          if (res.ok) {
            btnElement.closest("li").remove();
            unusedFilesCount.innerText = parseInt(unusedFilesCount.innerText) - 1;
          } else {
            alert("Failed to delete file.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }

      // 2. Individual Checkbox Toggle
      function toggleFileSelection(filePath, isChecked) {
        if (isChecked) {
          selectedFiles.add(filePath);
        } else {
          selectedFiles.delete(filePath);
        }
        updateSelectAllUI();
        updateBulkDeleteButton();
      }

      // 3. The "Select All" Master Toggle
      function toggleSelectAll(masterCheckbox) {
        const isChecked = masterCheckbox.checked;
        const individualCheckboxes = document.querySelectorAll(".file-checkbox");

        selectedFiles.clear(); // Clear existing selections

        if (isChecked) {
          // Add all currently displayed unused files to the Set
          // (Assuming 'unusedFiles' is your array of current files)
          unusedFiles.forEach((file) => selectedFiles.add(file));
        }

        // Visually check/uncheck every checkbox in the list
        individualCheckboxes.forEach((cb) => (cb.checked = isChecked));

        updateBulkDeleteButton();
      }

      // 4. Update the Master Checkbox State (if user clicks them one by one)
      function updateSelectAllUI() {
        const masterCheckbox = document.getElementById("selectAllCheckbox");
        if (!masterCheckbox) return;

        // Check the master box ONLY if the total selected matches the total available
        masterCheckbox.checked =
          unusedFiles.length > 0 && selectedFiles.size === unusedFiles.length;
      }

      // 5. Update the Bulk Delete Button Visuals
      function updateBulkDeleteButton() {
        if (!bulkDeleteButton) return;

        if (selectedFiles.size > 0) {
          bulkDeleteButton.disabled = false;
          bulkDeleteSelectedCount.innerText = `(${selectedFiles.size})`;
          // Active Red Styling
          bulkDeleteButton.className =
            "font-button-text text-button-text text-destructive-text border border-border-subtle rounded-lg px-3 py-1.5 hover:bg-destructive-hover-bg hover:border-destructive-border transition-colors flex items-center gap-1.5 disabled:text-zinc-600 disabled:pointer-events-none";
        } else {
          bulkDeleteButton.disabled = true;
          bulkDeleteSelectedCount.innerText = `(${selectedFiles.size})`;
          // Disabled Gray Styling
          bulkDeleteButton.className =
            "font-button-text text-button-text text-destructive-text border border-border-subtle rounded-lg px-3 py-1.5 hover:bg-destructive-hover-bg hover:border-destructive-border transition-colors flex items-center gap-1.5 disabled:text-zinc-600 disabled:pointer-events-none";
        }
      }

      // executes bulk delete
      async function executeBulkDelete() {
        console.log(unusedFiles);
        return;

        if (selectedFiles.size === 0) return;

        const filesArray = Array.from(selectedFiles);

        if (!confirm(`Permanently delete ${filesArray.length} files?\nThis cannot be undone.`))
          return;

        try {
          const res = await fetch("/api/knip", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filePaths: filesArray }), // Send the array!
          });

          if (res.ok) {
            // Clear selections and refresh your UI
            selectedFiles.clear();
            updateSelectAllUI();
            updateBulkDeleteButton();
            // Re-fetch or manually remove deleted items from your unusedFiles state
          } else {
            alert("Failed to delete some files.");
          }
        } catch (err) {
          alert("Error connecting to server.");
        }
      }

      init();
    </script>
